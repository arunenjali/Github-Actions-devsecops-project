name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  devsecops:
    name: End-to-End DevSecOps Pipeline
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
    # 🔹 Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔹 Setup Java
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 🔹 Build Application
    - name: Build Application (Maven)
      run: mvn clean package

    # 🔹 CodeQL Init
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: java

    # 🔹 CodeQL Autobuild
    - name: CodeQL Autobuild
      uses: github/codeql-action/autobuild@v2

    # 🔹 CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

    # 🔹 Build Docker Image
    - name: Build Docker Image
      run: docker build -t devsecops-demo:latest .

    # 🔹 Scan Docker Image
    - name: Scan Docker Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: devsecops-demo:latest

    # 🔹 Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔹 Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 🔹 Set Repository Name (Best Practice)
    - name: Set ECR Repository
      run: echo "ECR_REPOSITORY=devsecops-demo" >> $GITHUB_ENV

    # 🔹 Tag Image
    - name: Tag Docker Image
      run: |
        docker tag devsecops-demo:latest ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

    # 🔹 Push Image
    - name: Push Docker Image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest